<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="26" fill="#1A6B7A"/>
  <!-- Document behind (faint) -->
  <rect x="22" y="20" width="42" height="56" rx="5" fill="none" stroke="#fff" stroke-width="2.5" opacity=".35"/>
  <rect x="32" y="34" width="22" height="2.5" rx="1.25" fill="#fff" opacity=".2"/>
  <rect x="32" y="42" width="16" height="2.5" rx="1.25" fill="#fff" opacity=".2"/>
  <rect x="32" y="50" width="20" height="2.5" rx="1.25" fill="#fff" opacity=".2"/>
  <!-- Magnified inside glass -->
  <defs><clipPath id="g"><circle cx="60" cy="56" r="20.25"/></clipPath></defs>
  <g clip-path="url(#g)">
    <rect x="22" y="20" width="42" height="56" rx="5" fill="none" stroke="#fff" stroke-width="3.5"/>
    <rect x="32" y="34" width="22" height="4" rx="2" fill="#fff"/>
    <rect x="32" y="42" width="16" height="4" rx="2" fill="#fff"/>
    <rect x="32" y="50" width="20" height="4" rx="2" fill="#fff"/>
